apiVersion: batch/v1
kind: CronJob
metadata:
  name: scrape-spotahome
  namespace: madrid-rental-finder
  labels:
    app: mrf-scraper
    portal: spotahome
    app.kubernetes.io/part-of: madrid-rental-finder
    app.kubernetes.io/component: scraper
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: mrf-scraper
            portal: spotahome
        spec:
          restartPolicy: Never
          containers:
            - name: scraper
              image: dahomelab.azurecr.io/madrid-rental-finder/api:latest
              imagePullPolicy: Always
              command: ["python", "-m", "mrf.cli", "scrape", "spotahome"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: mrf-db-credentials
                      key: DATABASE_URL
                - name: MRF_LOG_LEVEL
                  valueFrom:
                    configMapKeyRef:
                      name: mrf-config
                      key: MRF_LOG_LEVEL
                - name: MRF_SCRAPE_MAX_PAGES
                  valueFrom:
                    configMapKeyRef:
                      name: mrf-config
                      key: MRF_SCRAPE_MAX_PAGES
                - name: MRF_SPOTAHOME_BASE_URL
                  valueFrom:
                    configMapKeyRef:
                      name: mrf-config
                      key: MRF_SPOTAHOME_BASE_URL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 768Mi
