apiVersion: batch/v1
kind: CronJob
metadata:
  name: reconcile-listings
  namespace: madrid-rental-finder
  labels:
    app: mrf-reconciler
    app.kubernetes.io/part-of: madrid-rental-finder
    app.kubernetes.io/component: reconciler
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: mrf-reconciler
        spec:
          imagePullSecrets:
            - name: acr-secret
          restartPolicy: Never
          containers:
            - name: reconciler
              image: mimircrsce.azurecr.io/madrid-rental-finder/api:latest
              imagePullPolicy: Always
              command: ["python", "-m", "mrf.cli", "reconcile"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: mrf-db-credentials
                      key: DATABASE_URL
                - name: MRF_LOG_LEVEL
                  valueFrom:
                    configMapKeyRef:
                      name: mrf-config
                      key: MRF_LOG_LEVEL
                - name: MRF_INACTIVE_TTL_DAYS
                  valueFrom:
                    configMapKeyRef:
                      name: mrf-config
                      key: MRF_INACTIVE_TTL_DAYS
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
