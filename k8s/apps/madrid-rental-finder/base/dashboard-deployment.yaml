apiVersion: apps/v1
kind: Deployment
metadata:
  name: mrf-dashboard
  namespace: madrid-rental-finder
  labels:
    app: mrf-dashboard
    app.kubernetes.io/part-of: madrid-rental-finder
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mrf-dashboard
  template:
    metadata:
      labels:
        app: mrf-dashboard
        app.kubernetes.io/part-of: madrid-rental-finder
        app.kubernetes.io/component: dashboard
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: dashboard
          image: mimircrsce.azurecr.io/madrid-rental-finder/dashboard:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
